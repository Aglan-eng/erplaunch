# Render blueprint — one api service + one Key Value (Redis) + one persistent disk.
# Create by pointing Render at this repo: Dashboard → Blueprints → New Blueprint.
#
# Env vars marked `sync: false` must be filled in manually from the Render UI.
# Every secret stays out of git.

services:
  - type: web
    name: erplaunch-api
    runtime: docker
    region: oregon        # change if you prefer another region
    plan: starter         # $7/mo; free plan has no persistent disks
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    disk:
      name: erplaunch-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 3000
      - key: DATABASE_URL
        value: file:/data/db/dev.db
      # Rotated secrets — paste into Render UI once (sync:false keeps them out of git)
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: PORTAL_SESSION_COOKIE_SECRET
        sync: false
      - key: ERPLAUNCH_MASTER_KEY
        sync: false
      # AI + third parties
      - key: AI_PROVIDER
        value: anthropic
      - key: AI_MODEL
        value: claude-sonnet-4-20250514
      - key: AI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_VERIFY_SERVICE_SID
        sync: false
      # Google OAuth (Phase 21). All three must be set for "Continue with
      # Google" to register; missing any one disables the feature cleanly.
      # Get values from Google Cloud Console → APIs & Services → Credentials.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://erplaunch-api.onrender.com/api/v1/auth/google/callback
      # Wiring — CORS_ORIGIN is the canonical SPA origin only. The two
      # legacy aliases (erplaunch.vercel.app, erplaunch-api.vercel.app)
      # were trimmed 2026-04-26 after Google OAuth went live; neither
      # resolved to a working host. APP_URL mirrors this for outbound
      # email links.
      - key: CORS_ORIGIN
        value: https://erplaunch-web.vercel.app
      - key: APP_URL
        value: https://erplaunch-web.vercel.app
      # Portal tunables (defaults are fine, override if needed)
      - key: PORTAL_SESSION_TTL_DAYS
        value: "7"
      - key: PORTAL_AUTH_RATELIMIT_REQUEST_PER_MIN
        value: "3"
      - key: PORTAL_AUTH_RATELIMIT_VERIFY_PER_MIN
        value: "5"
      - key: PORTAL_OTP_TTL_MINUTES
        value: "10"
      - key: PORTAL_OTP_MAX_ATTEMPTS
        value: "5"
      - key: PORTAL_OTP_CODE_LENGTH
        value: "6"
      # Redis wired via fromService below
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: erplaunch-redis
          property: connectionString

  - type: keyvalue
    name: erplaunch-redis
    region: oregon
    plan: free
    ipAllowList: []       # Render-internal access only
